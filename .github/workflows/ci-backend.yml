name: CI — Backend Spring Boot

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test-and-build:
    name: 🧪 Tests + Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: ☕ Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: 🧪 Lancer les tests
        run: cd backend && ./mvnw test -Dspring.profiles.active=test
        env:
          JWT_SECRET: TestSecretKeyForCICD1234567890AbCdEfGhIj
          JWT_EXPIRATION: 86400000

      - name: 🏗️ Build JAR
        run: cd backend && ./mvnw package -DskipTests

      - name: ✅ Succès
        run: echo "✅ Backend build réussi !"
