# Database — valeurs par défaut (overridées par Docker env vars)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/civil_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:nouamanebahij}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

jwt.secret=${JWT_SECRET:VotreSecretTresLongEtSecurise1234567890AbCdEfGhIj}
jwt.expiration=${JWT_EXPIRATION:86400000}

spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

logging.level.org.springframework.security=WARN
